<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.A.M.O Match - Abriendo Torneo...</title>
    <!-- Pre-load font for visual aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #0B0E14;
            color: #ffffff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #CCFF00;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h1 { margin: 0; font-size: 24px; letter-spacing: 2px; }
        p { color: #888; font-size: 14px; margin-top: 10px; max-width: 80%; }
        .btn {
            margin-top: 30px;
            background-color: #CCFF00;
            color: #0B0E14;
            padding: 15px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
        }
    </style>

    <script>
        // Este script obtiene el ID del torneo de la URL y fuerza abrir la app
        window.onload = function() {
            // Ejemplo de URL: https://nicomania11.github.io/samo/?tournament=123
            const urlParams = new URLSearchParams(window.location.search);
            const tournamentId = urlParams.get('tournament');
            
            if (tournamentId) {
                // Link con custom scheme que atrapa el AppLinks en Flutter
                const appLink = "samo://tournament/" + tournamentId;
                
                // Redirigir a la app inmediatamente
                window.location.href = appLink;

                // Si después de 2.5 segundos seguimos aquí, la app no está instalada
                setTimeout(function() {
                    document.getElementById('message').innerText = 
                        "Parece que no tienes S.A.M.O instalada. Descárgala en la tienda de aplicaciones e intenta de nuevo.";
                }, 2500);
            } else {
                document.getElementById('message').innerText = "Enlace de torneo inválido.";
                document.querySelector('.loader').style.display = 'none';
            }
        };
    </script>
</head>
<body>
    <div class="loader"></div>
    <h1>S.A.M.O Match</h1>
    <p id="message">Conectando con la pista...</p>
    
    <!-- Fallback si la redirección falla -->
    <a href="#" class="btn" onclick="window.location.reload()">Reintentar Conexión</a>
</body>
</html>
